<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamsoft Barcode Scanner Sample - Hello World (Decode via Camera)</title>

  <!-- Include Dynamsoft Barcode Reader Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.4.2000/dist/dbr.bundle.js"></script>
  <!-- If the network is unstable or you prefer to self-host the SDK, uncomment the line below to load it locally -->
  <!-- <script src="../dist/dbr.bundle.js"></script> -->
</head>

<body>
  <noscript>
    <iframe
      src="https://www.googletagmanager.com/ns.html?id=GTM-538F83"
      height="0"
      width="0"
      style="display: none; visibility: hidden"
    ></iframe>
  </noscript>
  <script>
    if (!navigator.webdriver) {
      setTimeout(() => {
        (function (w, d, s, l, i) {
          w[l] = w[l] || [];
          w[l].push({
            "gtm.start": new Date().getTime(),
            event: "gtm.js",
          });
          var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != "dataLayer" ? "&l=" + l : "";

          j.async = true;
          j.src = "//www.googletagmanager.com/gtm.js?id=" + i + dl;
          f.parentNode.insertBefore(j, f);
        })(window, document, "script", "dataLayer", "GTM-538F83");
      }, 0);
    }
  </script>
  <h1 class="barcode-scanner-title">
    Hello World (Scan Barcode via Camera)
  </h1>
  <!-- This div will host the barcode scanner's camera view -->
  <div class="barcode-scanner-view" style="width: 100%; height: 70vh;"></div>
  <div class="result-view" style="width: 100%; height: calc(30vh - 80px); padding: 10px;overflow: auto;"></div>
  <script>
    const resultView = document.querySelector(".result-view");

    Dynamsoft.License.LicenseManager.initLicense("DLS2eyJoYW5kc2hha2VDb2RlIjoiMjAwMDAwLWRicl9qc19zYW1wbGVzIiwib3JnYW5pemF0aW9uSUQiOiIyMDAwMDAifQ==");
    (async () => {
      const cameraView = await Dynamsoft.DCE.CameraView.createInstance();
      const cameraEnhancer = await Dynamsoft.DCE.CameraEnhancer.createInstance(cameraView);
      const cvRouter = await Dynamsoft.CVR.CaptureVisionRouter.createInstance();

      cvRouter.setInput(cameraEnhancer);

      const resultReceiver = new Dynamsoft.CVR.CapturedResultReceiver();
      resultReceiver.onDecodedBarcodesReceived = (result) => {
        console.log(result);
        resultView.innerHTML = "";
        for (let item of result.barcodeResultItems) {
          const div = document.createElement("div");
          div.innerHTML = `format: ${item.formatString}<br> text: ${item.text} <br> ------------------`;
          resultView.append(div);
        }
      };
      await cvRouter.addResultReceiver(resultReceiver);

      // Filter out unchecked and duplicate results.
      const filter = new Dynamsoft.Utility.MultiFrameResultCrossFilter();
      // Filter out unchecked barcodes.
      filter.enableResultCrossVerification("barcode", true);
      // Filter out duplicate barcodes within 3 seconds.
      filter.enableResultDeduplication("barcode", true);
      await cvRouter.addResultFilter(filter);

      const uiElement = cameraView.getUIElement();
      document.querySelector(".barcode-scanner-view").append(uiElement);

      await cameraEnhancer.open();
      await cvRouter.startCapturing("ReadBarcodes_SpeedFirst");
    })();
  </script>

  <!--
    Please note that putting CSS at the end is not a best practice. 
    We do this so that you can focus on reading the JS logic.
  -->
  <style>
    /* Reset default margin and padding, and apply border-box sizing */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Ensure html and body take full viewport size */
    html,
    body {
      width: 100%;
      height: 100%;
    }

    /* Style for the scanner title */
    .barcode-scanner-title {
      height: 80px;
      text-align: center;
      font-size: 20px;
      padding: 20px 0;
    }

    /* Container where the barcode scanner will be rendered */
    .barcode-scanner-view {
      width: 100%;
      height: calc(100% - 80px);
      /* Fill remaining space below the title */
    }
  </style>
</body>

</html>
