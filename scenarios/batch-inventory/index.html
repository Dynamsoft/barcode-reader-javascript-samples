<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Inventory with BarcodeScanner</title>
  <link rel="stylesheet" href="./index.css">
  <!-- Include Dynamsoft Barcode Reader Bundle via CDN -->
  <script src="https://npm.scannerproxy.com:802/cdn/@dynamsoft/dynamsoft-barcode-reader-bundle@11.4.2000-dev-20260403134442/dist/dbr.bundle.js"></script>
  <!-- If the network is unstable or you prefer to self-host the SDK, uncomment the line below to load it locally -->
  <!-- <script src="../../../dist/dbr.bundle.js"></script> -->
</head>

<body>
  <div class="barcode-reader-view">
    <div class="scanner-view">
      <div class="loading-view">
        <div class="loading-spinner"></div>
        <span class="loading-text">Loading...</span>
      </div>
    </div>
    <div class="result-view">
      <div class="current-session-result-list"></div>
      <div class="footer-toolbar">
        <div class="clear-btn">Clear</div>
        <div class="done-btn">Done</div>
      </div>
    </div>
  </div>
  <div class="summary-view">
    <header>
      <svg t="1754028476225" class="icon-back" viewBox="0 0 1445 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="1408" id="mx_n_1754028476225" width="25" height="25">
        <path d="M1350.649885 471.551065H183.240025l340.356908-340.294583A54.160438 54.160438 0 0 0 447.061814 54.721363L14.526209 487.630919a56.092514 56.092514 0 0 0-11.779428 17.637979 54.659038 54.659038 0 0 0 0 41.321485 56.092514 56.092514 0 0 0 11.779428 17.63798l432.535605 432.660255a54.160438 54.160438 0 1 0 76.597444-76.597443L183.240025 579.684967h1167.40986a54.098113 54.098113 0 1 0 0-108.133902" p-id="1409" fill="#ffffff"></path>
      </svg>
      <span>Summary</span>
    </header>
    <div class="summary-container">
      <div class="total-unique-barcodes-count">
        <span>Total Unique Barcodes Count</span>
        <span class="count">0</span>
      </div>
      <div class="session">
        <div class="total-count-in-this-session">
          <span>Total Count in This Session</span>
          <span class="count">0</span>
        </div>
        <div class="code-type-distribution">
          <div class="title">Code Type Distribution</div>
          <ul class="result-list"></ul>
        </div>
      </div>
      <div class="duration">
        <span>Duration</span>
        <span class="time"></span>
      </div>
    </div>
  </div>

  <script>
    const barcodeScannerView = document.querySelector(".barcode-reader-view");
    const scannerView = document.querySelector(".scanner-view");
    const resultView = document.querySelector(".result-view");
    const currentSessionResultList = document.querySelector(".current-session-result-list");
    const loadingView = document.querySelector(".loading-view");
    const summaryView = document.querySelector(".summary-view");
    const finishBtn = document.querySelector(".finish-btn");
    const backBtn = document.querySelector(".icon-back");
    const clearBtn = document.querySelector(".clear-btn");
    const doneBtn = document.querySelector(".done-btn");

    let currentSessionResult = [];
    let totalUniqueBarcodesResult = {};
    let totalUniqueBarcodesCount = 0;
    let startTime;

    Dynamsoft.License.LicenseManager.initLicense("DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9", { executeNow: true });
    const pInit = (async () => {
      const cameraView = await Dynamsoft.DCE.CameraView.createInstance();
      const cameraEnhancer = await Dynamsoft.DCE.CameraEnhancer.createInstance(cameraView);
      const cvRouter = await Dynamsoft.CVR.CaptureVisionRouter.createInstance();

      cvRouter.setInput(cameraEnhancer);

      const resultReceiver = new Dynamsoft.CVR.CapturedResultReceiver();
      resultReceiver.onDecodedBarcodesReceived = (result) => {
        for (let item of result.barcodeResultItems) {
          if (!hasItem(item)) {
            currentSessionResult.push(item);
          }
        }
        renderCurrentSessionScanResult();
      }
      cvRouter.addResultReceiver(resultReceiver);

      const uiElement = cameraView.getUIElement();
      uiElement.querySelector(".dce-sel-camera").style.display = "none";
      uiElement.querySelector(".dce-sel-resolution").style.display = "none";
      cameraEnhancer.setVideoFit("cover");
      scannerView.append(uiElement);

      return {
        cameraView,
        cameraEnhancer,
        cvRouter
      }
    })();

    const launchBarcodeScanner = async () => {
      loadingView.style.display = "flex";
      barcodeScannerView.style.display = "flex";
      summaryView.style.display = "none";
      currentSessionResult = [];

      const { cameraView, cameraEnhancer, cvRouter } = await pInit;
      startTime = Date.now();
      await cameraEnhancer.open();
      await cvRouter.startCapturing("ReadBarcodes_SpeedFirst");
      loadingView.style.display = "none";
    }

    launchBarcodeScanner();

    const hasItem = (item) => {
      return currentSessionResult.find((result) => {
        return result.text === item.text && result.formatString === item.formatString;
      })
    }

    const renderCurrentSessionScanResult = () => {
      currentSessionResultList.innerText = "";
      for (let item of currentSessionResult) {
        const resultItemDiv = document.createElement("div");
        resultItemDiv.innerText = `format: ${item.formatString}, text: ${item.text}`;
        currentSessionResultList.append(resultItemDiv);
      }
    }

    const readerResultList = () => {
      const resultListNode = document.querySelector(".result-list");
      resultListNode.innerText = "";
      const countResult = countByFormat(currentSessionResult);
      for (let formatString in countResult) {
        const nodeLiStr = `
          <li>
            <span class="format">${formatString}</span>
            <span class="decode-count">${countResult[formatString]}</span>
          </li>
        `;
        resultListNode.insertAdjacentHTML("beforeend", nodeLiStr);
      }
    }

    const countByFormat = (items) => {
      const result = {};
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        if (!result.hasOwnProperty(item.formatString)) {
          result[item.formatString] = 1;
        } else {
          result[item.formatString]++;
        }
      }
      mergeResult(result);
      console.log("Total Unique Barcodes Result: ", totalUniqueBarcodesResult);
      return result;
    }

    const mergeResult = (newResult) => {
      for (let formatString in newResult) {
        if (!totalUniqueBarcodesResult.hasOwnProperty(formatString)) {
          totalUniqueBarcodesResult[formatString] = newResult[formatString];
        } else {
          totalUniqueBarcodesResult[formatString] += newResult[formatString];
        }
      }
    }

    const getDurationTime = (time) => {
      const now = new Date();
      const startDate = new Date(time);
      const endDate = now;

      const durationMs = endDate - startDate;

      const totalSeconds = Math.floor(durationMs / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      const formatUnit = (unit) => unit.toString().padStart(2, '0');
      const formattedHours = formatUnit(hours);
      const formattedMinutes = formatUnit(minutes);
      const formattedSeconds = formatUnit(seconds);

      const formatTime = (date) => {
        return [
          date.getHours(),
          date.getMinutes(),
          date.getSeconds()
        ].map(unit => formatUnit(unit)).join(':');
      };

      const startTime = formatTime(startDate);
      const endTime = formatTime(endDate);

      return `${formattedHours}:${formattedMinutes}:${formattedSeconds} (${startTime} ~ ${endTime})`;
    }

    backBtn.addEventListener("click", launchBarcodeScanner);

    clearBtn.addEventListener("click", () => {
      currentSessionResult = [];
      renderCurrentSessionScanResult();
    });

    doneBtn.addEventListener("click", async () => {
      const { cameraEnhancer, cvRouter } = await pInit;
      await cameraEnhancer.close();
      await cvRouter.stopCapturing();
      barcodeScannerView.style.display = "none";
      summaryView.style.display = "flex";
      totalUniqueBarcodesCount += currentSessionResult.length;
      document.querySelector(".total-unique-barcodes-count .count").innerText = totalUniqueBarcodesCount;
      document.querySelector(".total-count-in-this-session .count").innerText = currentSessionResult.length;
      document.querySelector(".time").innerText = getDurationTime(startTime);
      readerResultList();
      currentSessionResult = [];
      renderCurrentSessionScanResult();
      console.log("Current Scan Session Result: ", currentSessionResult);
    });
  </script>
</body>

</html>
