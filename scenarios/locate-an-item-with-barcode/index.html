<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta name="description" content="Locate an item quickly with Dynamsoft Barcode Reader." />
  <meta name="keywords" content="locate item barcode, locate item barcode" />
  <link rel="stylesheet" href="./index.css">
  <title>Dynamsoft Barcode Reader Sample - Locate an Item with Barcode</title>

  <script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.4.2000/dist/dbr.bundle.js"></script>
  <!-- If the network is unstable or you prefer to self-host the SDK, uncomment the line below to load it locally -->
  <!-- <script src="../../../dist/dbr.bundle.js"></script> -->
</head>

<body>
  <!-- Container to retrieve user input -->
  <div id="inputs-container">
    <div style="border-bottom: 2px solid #fe8e14; padding: 0 2rem">
      <h3 style="text-align: center">Locate an Item with Barcode</h3>
    </div>
    <div style="padding: 0 2rem">
      <p>1. Enter or Scan the Item ID that you're seaching for:</p>
      <div style="display: flex; gap: 1rem">
        <!-- Manual ID Input -->
        <input type="search" id="item-id" placeholder="Enter Item ID" style="flex: 8; width: 0" />
        <!-- Button to scan barcode to retrieve item ID -->
        <button type="button" id="scan-id-button" style="flex: 1">
          <img src="icons/scan-barcode-icon.svg" alt="scan" style="width: 1rem; height: 1rem" />
        </button>
      </div>
      <p id="error-message" style="margin: 0 auto; color: red; display: none">Please enter the item ID</p>
      <p>2. Start searching for the item</p>
      <!-- Button to start searching for barcode -->
      <button type="button" id="search-button">Start Searching</button>
    </div>
  </div>
  <!-- Footer -->
  <a href="https://www.dynamsoft.com" target="_blank"> <img src="icons/dynamsoft-logo.png" alt="Dynamsoft" /></a>
  <!-- Loading library message -->
  <span id="lib-load" style="font-size: x-large; padding: 2rem; display: none">Loading Library...</span>
  <!-- [Optional] - Create custom UI for CameraView -->
  <!-- Ref: https://www.dynamsoft.com/camera-enhancer/docs/web/programming/javascript/api-reference/cameraview.html#createInstance -->
  <!-- Ref: https://github.com/Dynamsoft/camera-enhancer-javascript-samples/blob/main/customize-ui/customize-ui.html -->
  <div id="camera-view-container" style="display: none">
    <div style="position: relative; width: 100%; height: 100%; background: rgb(34, 34, 34)">
      <!-- DCE loading component -->
      <svg class="dce-bg-loading" style="
            display: none;
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            margin: auto;
            width: 40%;
            height: 40%;
            fill: #aaa;
            animation: 1s linear infinite dce-rotate;
          " viewBox="0 0 1792 1792">
        <path d="M1760 896q0 176-68.5 336t-184 275.5-275.5 184-336 68.5-336-68.5-275.5-184-184-275.5-68.5-336q0-213 97-398.5t265-305.5 374-151v228q-221 45-366.5 221t-145.5 406q0 130 51 248.5t136.5 204 204 136.5 248.5 51 248.5-51 204-136.5 136.5-204 51-248.5q0-230-145.5-406t-366.5-221v-228q206 31 374 151t265 305.5 97 398.5z" />
      </svg>
      <div class="dce-video-container" style="position: absolute; left: 0; top: 0; width: 100%; height: 100%"></div>
      <div id="camera-view-options">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 2rem">
          <!-- [Optional - Custom UI to select camera and resolution -->
          <select type="button" id="select-camera-dropdown"></select>
          <!-- Close Camera View button -->
          <button id="close-button" type="button"></button>
        </div>
        <!-- [Optional] Title for Camera View -->
        <div style="display: flex; justify-content: center; flex-direction: column; align-items: center">
          <h3 id="camera-view-title"></h3>
          <h6 id="camera-switch-notification"></h6>
        </div>
      </div>
    </div>
  </div>
  <!-- Scanned barcode information containers -->
  <div id="results"></div>
  <!-- Images to indicate barcodes -->
  <img hidden id="checkmark-icon" src="icons/checkmark-icon.svg" />
  <img hidden id="cross-icon" src="icons/cross-icon.svg" />

  <script>
    /** LICENSE ALERT - README
     * To use the library, you need to first specify a license key using the API "initLicense()" as shown below.
     */
    Dynamsoft.License.LicenseManager.initLicense("DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9");
    /**
     * You can visit https://www.dynamsoft.com/customer/license/trialLicense?utm_source=samples&product=dbr&package=js to get your own trial license good for 30 days.
     * Note that if you downloaded this sample from Dynamsoft while logged in, the above license key may already be your own 30-day trial license.
     * For more information, see https://www.dynamsoft.com/barcode-reader/docs/web/programming/javascript/user-guide/index.html?ver=11.4.2000&cVer=true#specify-the-license&utm_source=samples or contact support@dynamsoft.com.
     * LICENSE ALERT - THE END
     */

    // Preload "BarcodeReader" module for reading barcodes. It will save time on the initial decoding by skipping the module loading.
    Dynamsoft.Core.CoreModule.loadWasm();

    const cameraViewContainer = document.getElementById("camera-view-container");
    const cameraViewTitle = document.getElementById("camera-view-title");
    const closeButton = document.getElementById("close-button");
    const inputsContainer = document.getElementById("inputs-container");
    const errorMessage = document.getElementById("error-message");
    const loadingIndicator = document.getElementById("lib-load");
    const cameraSwitchNotification = document.getElementById("camera-switch-notification");
    const resultsContainer = document.getElementById("results");
    const cameraDropdownElement = document.getElementById("select-camera-dropdown");
    const itemIdInput = document.getElementById("item-id");
    const scanIdButton = document.getElementById("scan-id-button");
    const searchButton = document.getElementById("search-button");
    const checkmarkIcon = document.getElementById("checkmark-icon");
    const crossIcon = document.getElementById("cross-icon");

    const resolutionList = ["Full HD", "HD"];
    const resolution = {
      [resolutionList[0]]: [1920, 1080],
      [resolutionList[1]]: [1280, 720],
    };

    let customDrawingLayer;
    let pInit;
    let resultReceiver;
    let notificationTimer;

    const imageDrawingStyleId = Dynamsoft.DCE.DrawingStyleManager.createDrawingStyle({
      strokeStyle: "rgba(0, 0, 0, 0)",
    });

    const showError = (error) => {
      const message = error?.message || error;
      console.error(error);
      alert(message);
    };

    const setBanner = (className, text) => {
      cameraViewTitle.className = className;
      cameraViewTitle.innerText = text;
    };

    const showCameraView = () => {
      cameraViewContainer.style.display = "";
    };

    const hideCameraView = () => {
      cameraViewContainer.style.display = "none";
    };

    const resetResults = () => {
      resultsContainer.innerHTML = "";
      resultsContainer.style.display = "none";
      customDrawingLayer?.clearDrawingItems();
    };

    const showInputs = () => {
      inputsContainer.style.display = "";
      loadingIndicator.style.display = "none";
    };

    const showLoading = () => {
      inputsContainer.style.display = "none";
      loadingIndicator.style.display = "";
    };

    const judgeCurResolution = ({ width, height }) => {
      const minValue = Math.min(width, height);
      const maxValue = Math.max(width, height);

      if (minValue > 480 && minValue < 960 && maxValue > 960 && maxValue < 1440) {
        return "HD";
      }

      if (minValue > 900 && minValue < 1440 && maxValue > 1400 && maxValue < 2160) {
        return "Full HD";
      }
    };

    const selectCameraOption = (cameraId, resolutionLabel) => {
      for (const option of cameraDropdownElement.options) {
        const [optionCameraId, optionResolution] = (option.value || "").split(",");
        option.selected = optionCameraId === cameraId && optionResolution === resolutionLabel;
      }
    };

    const showSwitchNotification = (className, text) => {
      clearTimeout(notificationTimer);
      cameraSwitchNotification.className = className;
      cameraSwitchNotification.innerText = text;
      cameraSwitchNotification.style.opacity = 1;
      notificationTimer = setTimeout(() => {
        cameraSwitchNotification.style.opacity = 0;
      }, 5000);
    };

    const getBarcodeBounds = (item) => {
      const points = item.location.points;
      const topLeft = {
        x: Math.min(points[0].x, points[1].x, points[2].x, points[3].x),
        y: Math.min(points[0].y, points[1].y, points[2].y, points[3].y),
      };
      const bottomRight = {
        x: Math.max(points[0].x, points[1].x, points[2].x, points[3].x),
        y: Math.max(points[0].y, points[1].y, points[2].y, points[3].y),
      };

      return {
        topLeft,
        bottomRight,
        midPoint: {
          x: (topLeft.x + bottomRight.x) / 2,
          y: (topLeft.y + bottomRight.y) / 2,
        },
      };
    };

    const createBarcodeIndicator = (xCoordinate, yCoordinate, imageElement) => {
      const iconSize = 50;
      return new Dynamsoft.DCE.ImageDrawingItem(
        imageElement,
        {
          x: xCoordinate - iconSize / 2,
          y: yCoordinate - iconSize / 2,
          width: iconSize,
          height: iconSize,
        },
        true,
        imageDrawingStyleId
      );
    };

    const createBubbleBox = (cameraEnhancer, item, bounds) => {
      const bubbleBoxContainer = document.createElement("div");
      bubbleBoxContainer.className = "bubble-box-container";

      const bubbleBoxOverlay = document.createElement("div");
      bubbleBoxOverlay.className = "bubble-box";
      bubbleBoxOverlay.innerText = item.text;
      bubbleBoxContainer.append(bubbleBoxOverlay);

      const clientTopLeft = cameraEnhancer.convertToClientCoordinates(bounds.topLeft);
      const clientBottomRight = cameraEnhancer.convertToClientCoordinates(bounds.bottomRight);
      bubbleBoxContainer.style.top = `${clientTopLeft.y}px`;
      bubbleBoxContainer.style.left = `${(clientTopLeft.x + clientBottomRight.x) / 2}px`;

      return bubbleBoxContainer;
    };

    const setResultReceiver = async (cvRouter, receiver) => {
      if (resultReceiver) {
        cvRouter.removeResultReceiver(resultReceiver);
      }
      resultReceiver = receiver;
      await cvRouter.addResultReceiver(resultReceiver);
    };

    const openCameraAndCapture = async (cameraEnhancer, cvRouter, templateName) => {
      showCameraView();
      if (!cameraEnhancer.isOpen()) {
        await cameraEnhancer.open();
      }
      await cvRouter.startCapturing(templateName);
    };

    const stopScanning = async () => {
      const { cameraEnhancer, cvRouter } = await (pInit = pInit || init());
      if (resultReceiver) {
        cvRouter.removeResultReceiver(resultReceiver);
        resultReceiver = null;
      }
      cvRouter.stopCapturing();
      cameraEnhancer.close();
    };

    const closeCameraView = async () => {
      resetResults();
      hideCameraView();
      showInputs();
      await stopScanning();
    };

    const populateCameraOptions = async (cameraEnhancer) => {
      const cameraList = await cameraEnhancer.getAllCameras();
      const currentCamera = await cameraEnhancer.getSelectedCamera();
      const currentResolution = await cameraEnhancer.getResolution();
      const currentResolutionLabel = judgeCurResolution(currentResolution);

      cameraDropdownElement.innerHTML = "";

      for (const camera of cameraList) {
        for (const resolutionLabel of resolutionList) {
          const option = document.createElement("option");
          option.innerText = `${camera?.label} (${resolutionLabel})`;
          option.value = `${camera?.deviceId},${resolutionLabel}`;
          option.selected = currentCamera.deviceId === camera.deviceId && currentResolutionLabel === resolutionLabel;
          cameraDropdownElement.append(option);
        }
      }
    };

    const init = async () => {
      showLoading();

      const cameraView = await Dynamsoft.DCE.CameraView.createInstance(cameraViewContainer);
      const cameraEnhancer = await Dynamsoft.DCE.CameraEnhancer.createInstance(cameraView);
      const cvRouter = await Dynamsoft.CVR.CaptureVisionRouter.createInstance();
      cvRouter.setInput(cameraEnhancer);

      const filter = new Dynamsoft.Utility.MultiFrameResultCrossFilter();
      filter.enableResultCrossVerification("barcode", true);
      await cvRouter.addResultFilter(filter);

      cameraView.getDrawingLayer(2).setVisible(false);
      customDrawingLayer = cameraEnhancer.getCameraView().createDrawingLayer();

      try {
        await cameraEnhancer.open();
        await populateCameraOptions(cameraEnhancer);
      } finally {
        showInputs();
      }

      return { cameraEnhancer, cvRouter, cameraView };
    };

    const validateItemId = () => {
      const itemId = itemIdInput.value;
      const hasValue = Boolean(itemId);

      itemIdInput.classList.toggle("error-animation", !hasValue);
      itemIdInput.style.border = hasValue ? "1px solid #fe8e14" : "1px solid red";
      errorMessage.style.display = hasValue ? "none" : "block";

      return hasValue ? itemId : "";
    };

    scanIdButton.addEventListener("click", async () => {
      setBanner("banner-default", "Scan the item ID by barcode");
      closeButton.innerText = "Type the item ID";

      try {
        const { cameraEnhancer, cvRouter } = await (pInit = pInit || init());

        await setResultReceiver(cvRouter, {
          onDecodedBarcodesReceived: (result) => {
            const scannedItem = result.barcodeResultItems?.[0];
            if (!scannedItem) {
              return;
            }

            itemIdInput.value = scannedItem.text;
            errorMessage.style.display = "none";
            closeCameraView().catch(showError);
          },
        });

        await openCameraAndCapture(cameraEnhancer, cvRouter, "ReadSingleBarcode");
      } catch (error) {
        showError(error);
      }
    });

    searchButton.addEventListener("click", async () => {
      const itemId = validateItemId();
      if (!itemId) {
        return;
      }

      closeButton.innerText = "Locate another item";

      try {
        const { cameraEnhancer, cvRouter } = await (pInit = pInit || init());
        resultsContainer.innerHTML = "";
        resultsContainer.style.display = "";

        await setResultReceiver(cvRouter, {
          onCapturedResultReceived: (result) => {
            customDrawingLayer.clearDrawingItems();
            resultsContainer.innerHTML = "";
            setBanner("banner-default", "Scan barcodes to search for the item");

            for (const item of result.items) {
              if (item.type !== Dynamsoft.Core.EnumCapturedResultItemType.CRIT_BARCODE) {
                continue;
              }

              const bounds = getBarcodeBounds(item);
              const isMatchedItem = item.text === itemId;
              const marker = createBarcodeIndicator(
                bounds.midPoint.x,
                bounds.midPoint.y,
                isMatchedItem ? checkmarkIcon : crossIcon
              );

              if (isMatchedItem) {
                resultsContainer.append(createBubbleBox(cameraEnhancer, item, bounds));
                setBanner("banner-success", "Item Found!");
              }

              customDrawingLayer.addDrawingItems([marker]);
            }
          },
        });

        await openCameraAndCapture(cameraEnhancer, cvRouter, "ReadBarcodes_Balance");
      } catch (error) {
        showError(error);
      }
    });

    cameraDropdownElement.addEventListener("change", async (event) => {
      const [selectedCameraId, selectedRes] = (event.target.value || "").split(",");
      const [width, height] = resolution[selectedRes] || [];

      try {
        const { cameraEnhancer } = await (pInit = pInit || init());
        await cameraEnhancer.selectCamera(selectedCameraId);
        await cameraEnhancer.setResolution({ width, height });

        const currentCamera = await cameraEnhancer.getSelectedCamera();
        const currentResolution = await cameraEnhancer.getResolution();
        const currentResolutionLabel = judgeCurResolution(currentResolution);

        if (currentCamera.deviceId !== selectedCameraId) {
          showSwitchNotification("banner-error", "Switch camera failed!");
          return;
        }

        if (currentResolutionLabel !== selectedRes) {
          selectCameraOption(currentCamera.deviceId, currentResolutionLabel);
          showSwitchNotification(
            "banner-error",
            `Switch resolution failed! ${selectedRes} might be unsupported in the camera.`
          );
          return;
        }

        showSwitchNotification(
          "banner-success",
          `Switched to ${currentCamera.label} (${selectedRes}) successfully!`
        );
      } catch (error) {
        showError(error);
      }
    });

    closeButton.addEventListener("click", async () => {
      try {
        await closeCameraView();
      } catch (error) {
        showError(error);
      }
    });
  </script>
</body>

</html>
